<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Librafolio — Plateforme de Publication Numérique</title>
    <meta name="description" content="Librafolio est la plateforme de publication numérique premium. Publiez, partagez et lisez vos documents PDF en ligne avec un lecteur flipbook élégant." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Librafolio — Plateforme de Publication Numérique" />
    <meta property="og:description" content="La plateforme premium pour publier et partager vos documents numériques." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Loader -->
    <div id="loader" class="loader">
      <div class="loader-logo">
        <span class="loader-icon">📖</span>
        <span class="loader-text">Librafolio</span>
      </div>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>

    <!-- App Root -->
    <div id="app">
      <!-- Navbar -->
      <nav id="navbar" class="navbar">
        <div class="navbar-container">
          <a href="#/" class="navbar-brand" data-link>
            <span class="brand-icon">📖</span>
            <span class="brand-name">Librafolio</span>
          </a>
          <div class="navbar-menu" id="navbar-menu">
            <a href="#/" class="nav-link" data-link>Accueil</a>
            <a href="#/publications" class="nav-link" data-link>Publications</a>
            <a href="#/dashboard" class="nav-link" data-link>Dashboard</a>
          </div>
          <div class="navbar-actions">
            <a href="#/login" class="btn btn-ghost" data-link>Connexion</a>
            <a href="#/register" class="btn btn-primary" data-link>Commencer</a>
          </div>
          <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </nav>

      <!-- Page Container -->
      <main id="page-container"></main>

      <!-- Footer -->
      <footer id="footer" class="footer">
        <div class="footer-container">
          <div class="footer-brand">
            <span class="brand-icon">📖</span>
            <span class="brand-name">Librafolio</span>
            <p>La plateforme premium de publication numérique.</p>
          </div>
          <div class="footer-links">
            <div class="footer-col">
              <h4>Produit</h4>
              <a href="#/">Accueil</a>
              <a href="#/publications">Publications</a>
              <a href="#/dashboard">Dashboard</a>
            </div>
            <div class="footer-col">
              <h4>Compte</h4>
              <a href="#/login">Connexion</a>
              <a href="#/register">Inscription</a>
            </div>
            <div class="footer-col">
              <h4>Légal</h4>
              <a href="#">Confidentialité</a>
              <a href="#">CGU</a>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2026 Librafolio. Tous droits réservés.</p>
        </div>
      </footer>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
