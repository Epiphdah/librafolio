kind = "web"
previewPath = "/"
title = "Publika — Plateforme de Publication Numérique"
version = "1.0.0"
id = "artifacts/publika"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22382

[services.development]
run = "pnpm --filter @workspace/publika run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/publika", "run", "build" ]
publicDir = "artifacts/publika/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22382"
BASE_PATH = "/"
